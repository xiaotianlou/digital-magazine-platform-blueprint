services:
  php-demo:
    build:
      context: ../php
      dockerfile: Dockerfile
    image: magazine-php-demo:latest
    container_name: magazine-php-demo
    restart: unless-stopped
    ports:
      - "8091:8091"
    # 不需要 volume,PDF 已 COPY 进 image
    # 如果想热更 PDF,可挂载 ../php/public/pdf:/app/public/pdf
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/"]
      interval: 30s
      timeout: 5s
      retries: 3

  java-demo:
    build:
      context: ../java
      dockerfile: Dockerfile
    image: magazine-java-demo:latest
    container_name: magazine-java-demo
    restart: unless-stopped
    ports:
      - "8092:8092"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8092/"]
      interval: 30s
      timeout: 5s
      retries: 3

# 不内置 nginx — 159.203.0.28 已有宿主 nginx,见 deploy/nginx.conf
