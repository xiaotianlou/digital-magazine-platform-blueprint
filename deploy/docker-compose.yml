services:
  php-demo:
    build:
      context: ../php
      dockerfile: Dockerfile
    image: magazine-php-demo:latest
    container_name: magazine-php-demo
    restart: unless-stopped
    ports:
      - "8091:80"   # 主机 8091 → 容器内 nginx :80
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  java-demo:
    build:
      context: ../java
      dockerfile: Dockerfile
    image: magazine-java-demo:latest
    container_name: magazine-java-demo
    restart: unless-stopped
    ports:
      - "8092:8092"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8092/"]
      interval: 30s
      timeout: 5s
      retries: 3

# 不内置 nginx — 159.203.0.28 已有宿主 nginx,见 deploy/nginx.conf
