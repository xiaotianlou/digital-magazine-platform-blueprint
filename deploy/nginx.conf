# nginx 配置片段(应放入宿主 nginx 的 sites-enabled/)
# /etc/nginx/sites-available/magazine-blueprint → ln -s /etc/nginx/sites-enabled/

# 现有 :8090 的 viewer (FastAPI) 不动
# 在 159.203.0.28:80 加两个新路径

server {
    listen 80;
    server_name 159.203.0.28;

    # PHP demo 反代
    location /demo-php/ {
        # 注意 trailing slash + 末尾 / 让 location 路径被剥离再转发
        proxy_pass http://localhost:8091/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ⚠️ 关键:必须关 buffering,否则 Range header 被吞,206 不工作
        proxy_buffering off;
        proxy_request_buffering off;

        # PDF 大,延长 timeout
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Java demo 反代
    location /demo-java/ {
        proxy_pass http://localhost:8092/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 现有 viewer(端口 8090)不动:用户访问 :8090 直连
    # 如果想统一从 80 入口,可加:
    # location / {
    #     proxy_pass http://localhost:8090/;
    #     proxy_buffering off;
    # }
}
